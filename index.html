<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动现场签到抽奖系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2b 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
        }

        /* 粒子背景 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #ff006e, #00d4ff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-flow 3s ease infinite;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        @keyframes gradient-flow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px;
        }

        /* 标签页切换 */
        .tab-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: 600;
            border: 2px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }

        .tab-btn:hover, .tab-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        /* 内容区域 */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 签到模块 */
        .checkin-area {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
            margin-bottom: 30px;
        }

        .checkin-form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .form-title {
            font-size: 1.8rem;
            color: #00d4ff;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 3px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 4px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* 签到统计 */
        .checkin-stats {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .stats-title {
            font-size: 1.5rem;
            color: #00d4ff;
            letter-spacing: 2px;
        }

        .stats-count {
            font-size: 2rem;
            font-weight: 700;
            color: #ff006e;
            text-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }

        .clear-btn {
            padding: 10px 25px;
            font-size: 1rem;
            background: rgba(255, 0, 110, 0.2);
            border: 1px solid rgba(255, 0, 110, 0.5);
            border-radius: 25px;
            color: #ff006e;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: rgba(255, 0, 110, 0.4);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        /* 签到列表 */
        .attendee-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .attendee-list::-webkit-scrollbar {
            width: 6px;
        }

        .attendee-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .attendee-list::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.5);
            border-radius: 3px;
        }

        .attendee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 10px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .attendee-item:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateX(5px);
        }

        .attendee-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .attendee-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }

        .attendee-company {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .attendee-time {
            font-size: 0.85rem;
            color: rgba(0, 212, 255, 0.7);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        /* 抽奖模块 */
        .lottery-area {
            text-align: center;
        }

        .lottery-display {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 30px;
            padding: 60px;
            margin-bottom: 40px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2), inset 0 0 50px rgba(0, 212, 255, 0.05);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .rolling-name {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #00d4ff, #ff006e, #00d4ff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: text-shine 1s linear infinite;
            letter-spacing: 10px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes text-shine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .rolling-name.stopped {
            animation: winner-pulse 0.5s ease infinite alternate;
        }

        @keyframes winner-pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .lottery-status {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            letter-spacing: 3px;
        }

        /* 抽奖控制 */
        .lottery-controls {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .prize-selector {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .prize-btn {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: 600;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 50px;
            color: #00d4ff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .prize-btn:hover, .prize-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
        }

        .action-btns {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            padding: 25px 60px;
            font-size: 1.5rem;
            font-weight: 700;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 4px;
        }

        .start-btn {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .start-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.5);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: rgba(255, 0, 110, 0.2);
            border: 2px solid rgba(255, 0, 110, 0.5);
            color: #ff006e;
        }

        .reset-btn:hover {
            background: rgba(255, 0, 110, 0.4);
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.3);
        }

        /* 中奖名单 */
        .winners-section {
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
        }

        .winners-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .winners-title {
            font-size: 1.5rem;
            color: #ffd700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .winners-title::before {
            content: '🏆';
            font-size: 1.8rem;
        }

        .winners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .winner-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.05));
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            animation: winner-appear 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes winner-appear {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-10deg);
            }
            50% {
                transform: scale(1.1) rotate(5deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        .winner-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 215, 0, 0.1) 50%,
                transparent 70%
            );
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .winner-rank {
            font-size: 0.9rem;
            color: #ffd700;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .winner-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .winner-company {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 40px 60px;
            z-index: 1000;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
        }

        .toast.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .toast.success {
            border-color: #00ff88;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.5);
        }

        .toast.error {
            border-color: #ff006e;
            box-shadow: 0 0 50px rgba(255, 0, 110, 0.5);
        }

        .toast-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .toast-message {
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 2px;
        }

        /* 礼花画布 */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            pointer-events: none;
        }

        /* 倒计时 */
        .countdown {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            font-weight: 900;
            color: #00d4ff;
            text-shadow: 0 0 50px rgba(0, 212, 255, 0.8);
            z-index: 998;
            opacity: 0;
            pointer-events: none;
        }

        .countdown.show {
            animation: countdown-pop 1s ease;
        }

        @keyframes countdown-pop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .main-title {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }

            .checkin-area {
                grid-template-columns: 1fr;
            }

            .rolling-name {
                font-size: 3rem;
            }

            .lottery-display {
                padding: 40px 20px;
            }

            .action-btn {
                padding: 20px 40px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 1.8rem;
            }

            .tab-btn {
                padding: 12px 30px;
                font-size: 1rem;
            }

            .rolling-name {
                font-size: 2rem;
                letter-spacing: 5px;
            }

            .prize-btn {
                padding: 12px 25px;
                font-size: 1rem;
            }

            .winners-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 闪烁效果 */
        .flash {
            animation: flash-animation 0.5s ease;
        }

        @keyframes flash-animation {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(3); }
        }

        /* 霓虹边框动画 */
        .neon-border {
            position: relative;
        }

        .neon-border::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf, #ff006e, #00d4ff);
            background-size: 400% 400%;
            border-radius: inherit;
            z-index: -1;
            animation: neon-glow 3s ease infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .neon-border:hover::before {
            opacity: 1;
        }

        @keyframes neon-glow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
    </style>
</head>
<body>
    <!-- 粒子背景画布 -->
    <canvas id="particles-canvas"></canvas>
    
    <!-- 礼花画布 -->
    <canvas id="confetti-canvas"></canvas>
    
    <!-- 倒计时 -->
    <div class="countdown" id="countdown"></div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast">
        <div class="toast-icon" id="toast-icon"></div>
        <div class="toast-message" id="toast-message"></div>
    </div>

    <div class="container">
        <!-- 标题 -->
        <header class="header">
            <h1 class="main-title">签到抽奖系统</h1>
            <p class="subtitle">EVENT CHECK-IN & LOTTERY SYSTEM</p>
        </header>

        <!-- 标签页 -->
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('checkin')">签到入场</button>
            <button class="tab-btn" onclick="switchTab('lottery')">幸运抽奖</button>
        </div>

        <!-- 签到模块 -->
        <section id="checkin-section" class="content-section active">
            <div class="checkin-area">
                <div class="checkin-form">
                    <h2 class="form-title">嘉宾签到</h2>
                    <form id="checkin-form" onsubmit="handleCheckin(event)">
                        <div class="input-group">
                            <label for="name">姓名</label>
                            <input type="text" id="name" placeholder="请输入您的姓名" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label for="company">公司 / 单位</label>
                            <input type="text" id="company" placeholder="请输入公司或单位名称" required autocomplete="off">
                        </div>
                        <button type="submit" class="submit-btn">确认签到</button>
                    </form>
                </div>

                <div class="checkin-stats">
                    <div class="stats-header">
                        <h3 class="stats-title">已签到人员</h3>
                        <div>
                            <span class="stats-count" id="attendee-count">0</span>
                            <span>人</span>
                        </div>
                    </div>
                    <button class="clear-btn" onclick="clearAllAttendees()">清空名单</button>
                    <div class="attendee-list" id="attendee-list">
                        <div class="empty-state">
                            <span style="font-size: 3rem;">👥</span>
                            <p>暂无签到人员</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 抽奖模块 -->
        <section id="lottery-section" class="content-section">
            <div class="lottery-area">
                <div class="lottery-display">
                    <div class="rolling-name" id="rolling-name">准备抽奖</div>
                    <div class="lottery-status" id="lottery-status">请选择抽奖人数并开始</div>
                </div>

                <div class="lottery-controls">
                    <div class="prize-selector">
                        <button class="prize-btn active" data-count="1" onclick="selectPrizeCount(1)">抽取 1 名</button>
                        <button class="prize-btn" data-count="3" onclick="selectPrizeCount(3)">抽取 3 名</button>
                        <button class="prize-btn" data-count="5" onclick="selectPrizeCount(5)">抽取 5 名</button>
                        <button class="prize-btn" data-count="10" onclick="selectPrizeCount(10)">抽取 10 名</button>
                    </div>

                    <div class="action-btns">
                        <button class="action-btn start-btn" id="start-btn" onclick="startLottery()">开始抽奖</button>
                        <button class="action-btn reset-btn" onclick="resetLottery()">重置抽奖</button>
                    </div>
                </div>

                <div class="winners-section" id="winners-section" style="display: none;">
                    <div class="winners-header">
                        <h3 class="winners-title">中奖名单</h3>
                        <span style="color: rgba(255, 255, 255, 0.6);">共 <span id="winner-count">0</span> 人</span>
                    </div>
                    <div class="winners-grid" id="winners-grid"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 数据存储
        let attendees = JSON.parse(localStorage.getItem('attendees')) || [];
        let winners = JSON.parse(localStorage.getItem('winners')) || [];
        let currentPrizeCount = 1;
        let isRolling = false;
        let rollInterval = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initParticles();
            renderAttendeeList();
            renderWinners();
            updateAttendeeCount();
        });

        // 标签页切换
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-section').classList.add('active');
        }

        // 签到处理
        function handleCheckin(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const company = document.getElementById('company').value.trim();
            
            if (!name || !company) {
                showToast('请填写完整信息', 'error');
                return;
            }
            
            // 检查是否已签到
            const exists = attendees.some(a => a.name === name && a.company === company);
            if (exists) {
                showToast('该人员已签到，请勿重复添加', 'error');
                return;
            }
            
            // 添加签到人员
            const attendee = {
                id: Date.now(),
                name: name,
                company: company,
                time: new Date().toLocaleString('zh-CN')
            };
            
            attendees.unshift(attendee);
            localStorage.setItem('attendees', JSON.stringify(attendees));
            
            // 重置表单
            document.getElementById('checkin-form').reset();
            
            // 更新显示
            renderAttendeeList();
            updateAttendeeCount();
            
            showToast('签到成功！', 'success');
        }

        // 渲染签到列表
        function renderAttendeeList() {
            const listEl = document.getElementById('attendee-list');
            
            if (attendees.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <span style="font-size: 3rem;">👥</span>
                        <p>暂无签到人员</p>
                    </div>
                `;
                return;
            }
            
            listEl.innerHTML = attendees.map(a => `
                <div class="attendee-item">
                    <div class="attendee-info">
                        <span class="attendee-name">${escapeHtml(a.name)}</span>
                        <span class="attendee-company">${escapeHtml(a.company)}</span>
                    </div>
                    <span class="attendee-time">${a.time}</span>
                </div>
            `).join('');
        }

        // 更新签到人数
        function updateAttendeeCount() {
            document.getElementById('attendee-count').textContent = attendees.length;
        }

        // 清空签到名单
        function clearAllAttendees() {
            if (attendees.length === 0) {
                showToast('签到名单已经是空的', 'error');
                return;
            }
            
            if (!confirm('确定要清空所有签到人员吗？此操作不可恢复！')) {
                return;
            }
            
            attendees = [];
            localStorage.setItem('attendees', JSON.stringify(attendees));
            renderAttendeeList();
            updateAttendeeCount();
            showToast('签到名单已清空', 'success');
        }

        // 选择抽奖人数
        function selectPrizeCount(count) {
            if (isRolling) return;
            
            currentPrizeCount = count;
            document.querySelectorAll('.prize-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-count="${count}"]`).classList.add('active');
        }

        // 开始抽奖
        async function startLottery() {
            if (isRolling) return;
            
            // 获取可抽奖人员（排除已中奖）
            const availableAttendees = attendees.filter(a => 
                !winners.some(w => w.id === a.id)
            );
            
            if (availableAttendees.length === 0) {
                showToast('没有可抽奖人员，请先签到', 'error');
                return;
            }
            
            if (availableAttendees.length < currentPrizeCount) {
                showToast(`可抽奖人数不足，仅剩 ${availableAttendees.length} 人`, 'error');
                return;
            }
            
            isRolling = true;
            document.getElementById('start-btn').disabled = true;
            
            // 倒计时
            await showCountdown();
            
            // 开始滚动
            const rollingNameEl = document.getElementById('rolling-name');
            const statusEl = document.getElementById('lottery-status');
            
            statusEl.textContent = '抽奖进行中...';
            
            rollInterval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * availableAttendees.length);
                const randomAttendee = availableAttendees[randomIndex];
                rollingNameEl.textContent = randomAttendee.name;
            }, 80);
            
            // 3秒后停止
            setTimeout(() => {
                stopLottery(availableAttendees);
            }, 3000);
        }

        // 停止抽奖
        function stopLottery(availableAttendees) {
            clearInterval(rollInterval);
            
            // 抽取中奖者
            const newWinners = [];
            const tempAttendees = [...availableAttendees];
            
            for (let i = 0; i < currentPrizeCount; i++) {
                const randomIndex = Math.floor(Math.random() * tempAttendees.length);
                const winner = tempAttendees.splice(randomIndex, 1)[0];
                winner.prizeTime = new Date().toLocaleString('zh-CN');
                winner.prizeRank = i + 1;
                newWinners.push(winner);
            }
            
            // 显示中奖者
            const rollingNameEl = document.getElementById('rolling-name');
            if (newWinners.length === 1) {
                rollingNameEl.textContent = newWinners[0].name;
            } else {
                rollingNameEl.innerHTML = newWinners.map(w => w.name).join(' · ');
            }
            rollingNameEl.classList.add('stopped');
            
            document.getElementById('lottery-status').textContent = 
                `恭喜 ${newWinners.length} 位获奖者！`;
            
            // 保存中奖者
            winners = [...winners, ...newWinners];
            localStorage.setItem('winners', JSON.stringify(winners));
            
            // 显示礼花
            createConfetti();
            
            // 显示闪光效果
            document.body.classList.add('flash');
            setTimeout(() => document.body.classList.remove('flash'), 500);
            
            // 渲染中奖名单
            renderWinners();
            
            isRolling = false;
            document.getElementById('start-btn').disabled = false;
            
            // 3秒后移除动画类
            setTimeout(() => {
                rollingNameEl.classList.remove('stopped');
            }, 3000);
        }

        // 渲染中奖名单
        function renderWinners() {
            const sectionEl = document.getElementById('winners-section');
            const gridEl = document.getElementById('winners-grid');
            const countEl = document.getElementById('winner-count');
            
            if (winners.length === 0) {
                sectionEl.style.display = 'none';
                return;
            }
            
            sectionEl.style.display = 'block';
            countEl.textContent = winners.length;
            
            gridEl.innerHTML = winners.map((w, index) => `
                <div class="winner-card">
                    <div class="winner-rank">第 ${index + 1} 位中奖者</div>
                    <div class="winner-name">${escapeHtml(w.name)}</div>
                    <div class="winner-company">${escapeHtml(w.company)}</div>
                </div>
            `).join('');
        }

        // 重置抽奖
        function resetLottery() {
            if (isRolling) return;
            
            if (winners.length === 0) {
                showToast('还没有中奖记录', 'error');
                return;
            }
            
            if (!confirm('确定要重置抽奖状态吗？所有中奖记录将被清空！')) {
                return;
            }
            
            winners = [];
            localStorage.setItem('winners', JSON.stringify(winners));
            
            document.getElementById('rolling-name').textContent = '准备抽奖';
            document.getElementById('lottery-status').textContent = '请选择抽奖人数并开始';
            document.getElementById('winners-section').style.display = 'none';
            
            showToast('抽奖状态已重置', 'success');
        }

        // 倒计时动画
        function showCountdown() {
            return new Promise(resolve => {
                const countdownEl = document.getElementById('countdown');
                const numbers = ['3', '2', '1', 'GO!'];
                let index = 0;
                
                function showNumber() {
                    if (index >= numbers.length) {
                        countdownEl.classList.remove('show');
                        resolve();
                        return;
                    }
                    
                    countdownEl.textContent = numbers[index];
                    countdownEl.classList.remove('show');
                    void countdownEl.offsetWidth; // 触发重排
                    countdownEl.classList.add('show');
                    
                    index++;
                    setTimeout(showNumber, 1000);
                }
                
                showNumber();
            });
        }

        // 显示提示
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-message');
            
            toast.className = 'toast ' + type;
            icon.textContent = type === 'success' ? '✓' : '✗';
            msg.textContent = message;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 粒子背景
        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);
            
            const particles = [];
            const particleCount = 80;
            
            class Particle {
                constructor() {
                    this.reset();
                }
                
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 0.5;
                    this.opacity = Math.random() * 0.5 + 0.2;
                    this.color = Math.random() > 0.5 ? '#00d4ff' : '#7b2cbf';
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                }
                
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.opacity;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                
                // 连线
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 100) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = '#00d4ff';
                            ctx.globalAlpha = (1 - dist / 100) * 0.2;
                            ctx.stroke();
                            ctx.globalAlpha = 1;
                        }
                    });
                });
                
                requestAnimationFrame(animate);
            }
            
            animate();
        }

        // 礼花效果
        function createConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const confetti = [];
            const colors = ['#00d4ff', '#7b2cbf', '#ff006e', '#ffd700', '#00ff88', '#ff6b35'];
            
            class ConfettiPiece {
                constructor() {
                    this.x = canvas.width / 2;
                    this.y = canvas.height / 2;
                    this.vx = (Math.random() - 0.5) * 30;
                    this.vy = (Math.random() - 0.5) * 30 - 10;
                    this.gravity = 0.5;
                    this.friction = 0.98;
                    this.size = Math.random() * 10 + 5;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.rotation = Math.random() * 360;
                    this.rotationSpeed = (Math.random() - 0.5) * 20;
                    this.opacity = 1;
                }
                
                update() {
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += this.rotationSpeed;
                    this.opacity -= 0.008;
                }
                
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate((this.rotation * Math.PI) / 180);
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                    ctx.restore();
                }
            }
            
            // 创建礼花
            for (let i = 0; i < 200; i++) {
                confetti.push(new ConfettiPiece());
            }
            
            let animationId;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                confetti.forEach((c, index) => {
                    c.update();
                    c.draw();
                    
                    if (c.opacity <= 0 || c.y > canvas.height + 50) {
                        confetti.splice(index, 1);
                    }
                });
                
                if (confetti.length > 0) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            
            animate();
        }
    </script>
